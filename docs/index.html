<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Storage1024 | Developer Documentation</title>
    <meta name="description" content="Integrate Storage1024 into any project. Polyglot SDK documentation.">
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="icon" type="image/svg+xml" href="/assets/icon.svg">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
</head>
<body class="minimalist">
    <div class="glass-bg"></div>
    <nav>
        <div class="logo-area" onclick="location.href='/'" style="cursor:pointer">
            <div class="logo">
                <img src="/assets/icon.svg" alt="S1024 Logo">
                STORAGE<span>1024</span>
            </div>
        </div>
        <div class="nav-links">
            <a href="/" class="btn-secondary" style="text-decoration:none">Dashboard</a>
        </div>
    </nav>

    <div class="docs-hero">
        <h1>Developer Docs</h1>
        <p>Unified storage and variables for any language on any platform.</p>
    </div>

    <div class="docs-layout">
        <aside class="docs-sidebar">
            <span class="sidebar-group">Basics</span>
            <button class="sidebar-link active" onclick="loadDoc('story', this)">Why Storage1024</button>
            <span class="sidebar-group">Software SDKs</span>
            <button class="sidebar-link" onclick="loadDoc('python', this)">Python</button>
            <button class="sidebar-link" onclick="loadDoc('go', this)">Go</button>
            <button class="sidebar-link" onclick="loadDoc('rust', this)">Rust</button>
            <button class="sidebar-link" onclick="loadDoc('php', this)">PHP</button>
            <button class="sidebar-link" onclick="loadDoc('js', this)">Browser / JS</button>
            <button class="sidebar-link" onclick="loadDoc('node', this)">Node.js</button>
            <button class="sidebar-link" onclick="loadDoc('ts', this)">TypeScript / React</button>
            <button class="sidebar-link" onclick="loadDoc('cpp', this)">C / C++</button>
            <button class="sidebar-link" onclick="loadDoc('csharp', this)">C#</button>
            <button class="sidebar-link" onclick="loadDoc('java', this)">Java</button>
            <button class="sidebar-link" onclick="loadDoc('ruby', this)">Ruby</button>
            <span class="sidebar-group">Shell & Scripting</span>
            <button class="sidebar-link" onclick="loadDoc('curl', this)">cURL</button>
            <button class="sidebar-link" onclick="loadDoc('bash', this)">Bash</button>
            <button class="sidebar-link" onclick="loadDoc('powershell', this)">PowerShell</button>
        </aside>

        <main id="doc-content" class="docs-content markdown-body">
            <div style="display:flex; justify-content:center; align-items:center; height:100%; opacity:0.5">
                Loading documentation...
            </div>
        </main>
    </div>

    <script src="script.js"></script>
</body>
</html>
